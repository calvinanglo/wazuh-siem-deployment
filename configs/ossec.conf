<ossec_config>
  <global>
    <email_notification>yes</email_notification>
    <email_from>wazuh@10.10.20.10</email_from>
    <smtp_server>localhost</smtp_server>
    <email_maxpending>1</email_maxpending>
    <email_log_source>alerts.log</email_log_source>
    <logall_json>yes</logall_json>
    <jsonout_output>yes</jsonout_output>
  </global>

  <!-- Syslog input from network devices -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>10.10.0.0/16</allowed-ips>
  </remote>

  <!-- Alert output to JSON file and Prometheus -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>7</email_alert_level>
  </alerts>

  <!-- Syslog forwarding to central logging on 10.10.20.10 -->
  <syslog_output>
    <server>localhost</server>
    <port>514</port>
  </syslog_output>

  <!-- Policy enforcement -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/ossec/logs/alerts/alerts.json</location>
  </localfile>

  <!-- File integrity monitoring -->
  <syscheck>
    <frequency>3600</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/bin</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/sbin</directories>
  </syscheck>

  <!-- Rootkit detection -->
  <rootcheck>
    <frequency>3600</frequency>
  </rootcheck>
</ossec_config>
