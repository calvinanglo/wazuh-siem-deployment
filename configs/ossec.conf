<ossec_config>
  <global>
    <email_notification>yes</email_notification>
    <email_from>wazuh@lab.internal</email_from>
    <email_to>noc@lab.internal</email_to>
    <smtp_server>localhost</smtp_server>
    <email_maxpending>12</email_maxpending>
    <email_log_source>alerts.log</email_log_source>
    <logall_json>yes</logall_json>
    <jsonout_output>yes</jsonout_output>
  </global>

  <!-- Syslog input from network devices on VLAN 10/20/30/99 -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>10.10.0.0/16</allowed-ips>
  </remote>

  <!-- Alert thresholds - level 3 logs everything, level 7 triggers email -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>7</email_alert_level>
  </alerts>

  <!-- Policy enforcement - read alerts JSON for downstream tooling -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/ossec/logs/alerts/alerts.json</location>
  </localfile>

  <!-- Auth log - catches SSH brute force and sudo escalation -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Syslog - catches kernel and service failures -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- File integrity monitoring - /etc /bin /sbin are high value targets -->
  <syscheck>
    <frequency>3600</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/bin</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/sbin</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/usr/bin</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/usr/sbin</directories>
    <!-- ignore volatile paths that change constantly -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/random-seed</ignore>
  </syscheck>

  <!-- Rootkit detection - runs alongside syscheck -->
  <rootcheck>
    <frequency>3600</frequency>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
  </rootcheck>

  <!-- Active response uses built-in rule 5763 (Wazuh default SSH brute force).
       Custom rule 100001 provides additional alerting but does not trigger active response
       to avoid duplicate blocking. -->
  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>5763</rules_id>
    <timeout>600</timeout>
  </active-response>

</ossec_config>
